name: Mirror to GitHub

on:
  push:
    branches: [master]

jobs:
  mirror:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p .ssh
          printf '%s\n' "$SSH_KEY" > .ssh/id_ed25519
          chmod 700 .ssh
          chmod 600 .ssh/id_ed25519

      - name: Push mirror
        run: |
          export GIT_SSH_COMMAND="ssh -i $PWD/.ssh/id_ed25519 -o IdentitiesOnly=yes -o UserKnownHostsFile=$PWD/.ssh/known_hosts -o StrictHostKeyChecking=accept-new"
          git remote add mirror git@github.com:lukasl-dev/nixos.git || true
          git push --mirror mirror
