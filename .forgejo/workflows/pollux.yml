name: Pollux

on:
  push:
    branches:
      - master

concurrency:
  group: pollux
  cancel-in-progress: true

env:
  NIX_CONFIG: experimental-features = nix-command flakes

jobs:
  deploy:
    runs-on: nixos
    steps:
      - name: Check out repository
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Pollux
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
        run: |
          set -euo pipefail

          export PATH="/run/current-system/sw/bin:$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"

          ssh_dir="$PWD/.ssh"
          mkdir -p "$ssh_dir"
          chmod 700 "$ssh_dir"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$ssh_dir/id_ed25519"
          chmod 600 "$ssh_dir/id_ed25519"
          ssh-keyscan -p 2222 -H pollux.lukasl.dev > "$ssh_dir/known_hosts"

          export NIX_SSHOPTS="-p 2222 -i $ssh_dir/id_ed25519 -o UserKnownHostsFile=$ssh_dir/known_hosts -o StrictHostKeyChecking=yes"

          nixos-rebuild switch \
            --flake .#pollux \
            --target-host lukas@pollux.lukasl.dev \
            --sudo \
            --use-substitutes \
            --max-jobs 1 \
            --cores 2 \
            --option substituters "https://cache.nixos.org/"
